<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI 产品工程框架总览</title>
  <desc id="desc">展示人类目标、产品生命周期、五大 AI 工程基础设施、治理与组织记忆以及持续反馈。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071225"/><stop offset="0.55" stop-color="#10234a"/><stop offset="1" stop-color="#1b3b62"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.17"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.07"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#52d6ff"/><stop offset="1" stop-color="#8a7dff"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.32"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6edcff"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="130" r="260" fill="#5c68ff" opacity="0.12"/><circle cx="170" cy="790" r="310" fill="#19c6df" opacity="0.09"/>
  <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" fill="#fff">
    <text x="100" y="105" font-size="54" font-weight="750">AI 产品工程框架</text>
    <text x="102" y="154" font-size="23" fill="#b9c9e8">从人的目标，到受控的 AI 执行，再到真实产品反馈</text>

    <g filter="url(#shadow)">
      <rect x="100" y="215" width="310" height="170" rx="30" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.22"/>
      <circle cx="170" cy="285" r="33" fill="#52d6ff" opacity="0.95"/>
      <path d="M155 285l11 11 22-27" fill="none" stroke="#071225" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="220" y="279" font-size="25" font-weight="700">人类目标与判断</text>
      <text x="220" y="316" font-size="18" fill="#c9d7ee">价值 · 取舍 · 责任</text>
      <text x="135" y="356" font-size="17" fill="#aebed9">决定为什么做、做什么以及何时发布</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="505" y="190" width="590" height="435" rx="38" fill="url(#card)" stroke="#6edcff" stroke-opacity="0.42"/>
      <text x="555" y="250" font-size="29" font-weight="750">产品交付生命周期</text>
      <g font-size="18" font-weight="650">
        <rect x="555" y="292" width="210" height="65" rx="18" fill="#143c62"/><text x="590" y="333">价值与产品定义</text>
        <rect x="835" y="292" width="210" height="65" rx="18" fill="#153d66"/><text x="872" y="333">体验与高保真</text>
        <rect x="555" y="393" width="210" height="65" rx="18" fill="#244276"/><text x="598" y="434">工程规格设计</text>
        <rect x="835" y="393" width="210" height="65" rx="18" fill="#29437d"/><text x="888" y="434">受控执行</text>
        <rect x="555" y="494" width="210" height="65" rx="18" fill="#344682"/><text x="590" y="535">验证与用户验收</text>
        <rect x="835" y="494" width="210" height="65" rx="18" fill="#3c4685"/><text x="871" y="535">发布与持续反馈</text>
      </g>
      <path d="M765 324h70M940 357v36M835 425h-70M660 458v36M765 526h70M1045 526c70 0 78-230 0-230" fill="none" stroke="#6edcff" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="1190" y="215" width="310" height="170" rx="30" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.22"/>
      <circle cx="1260" cy="285" r="34" fill="#8a7dff"/>
      <path d="M1242 286h36M1260 268v36" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
      <text x="1310" y="279" font-size="25" font-weight="700">治理与记忆</text>
      <text x="1310" y="316" font-size="18" fill="#c9d7ee">决策 · 变更 · 安全</text>
      <text x="1224" y="356" font-size="17" fill="#aebed9">让项目不随对话、模型或人员变化而失忆</text>
    </g>

    <path d="M410 300h95M1095 300h95" stroke="#6edcff" stroke-width="4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="165" y="690" width="1270" height="125" rx="32" fill="#071b34" stroke="url(#accent)" stroke-width="2"/>
      <text x="215" y="735" font-size="22" font-weight="720">AI 工程基础设施</text>
      <g font-size="19" font-weight="650" text-anchor="middle">
        <rect x="420" y="714" width="155" height="58" rx="17" fill="#123d5f"/><text x="497" y="750">Context</text>
        <rect x="600" y="714" width="155" height="58" rx="17" fill="#183d69"/><text x="677" y="750">Harness</text>
        <rect x="780" y="714" width="155" height="58" rx="17" fill="#263e75"/><text x="857" y="750">Skills</text>
        <rect x="960" y="714" width="155" height="58" rx="17" fill="#33407e"/><text x="1037" y="750">Agents</text>
        <rect x="1140" y="714" width="155" height="58" rx="17" fill="#494284"/><text x="1217" y="750">Loop</text>
      </g>
    </g>
    <path d="M800 690V625" stroke="#6edcff" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="800" y="862" text-anchor="middle" font-size="18" fill="#aebed9">可交付 · 可验证 · 可维护 · 可演进</text>
  </g>
</svg>